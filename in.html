<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="box1" style="width: fit-content;">
        <h1>Welcome back!</h1>
        <p id="para"><b>Enter your Credentials to access your account</b></p>
        <br><br>
        <div id="f">
            <form>
                <div id="getemail">
                    <label for="eml"><b>Email address</b></label><br>
                    <input type="email" id="eml" placeholder="Enter your email" required><br><br>
                </div>
                <div id="getpass">
                    <label for="pass"><b>Password</b></label>
                    <label for="pass" id="forgot">forgot password</label><br>
                    <input type="password" id="pass" placeholder="Name" required><br><br>
                </div>
                <div id="check">
                    <input type="checkbox" id="che">
                    <label for="che">Remember for 30 days</label><br><br>
                </div>
                <button id="login"><b>Login</b></button>
               
            </form>
            <br>
        </div>
        <p id="or">-------------------------------Or-------------------------------</p>
        <br><br><br>
        <a href="#"><button id="g" class="but"><b><img src="image1.png" class="v">Sign in with Google</b></button></a>
        <a href="#"><button id="a" class="but"><b> <img src="image.png" class="v"> Sign in with Apple</b></button></a>
        <p id="su"><b>Don't have an account? <span style="color: blue;">Sign up</span></b></p>
    </div>
    <img src="c230ffba520fab60716f712257d7f6a7fc48a42f.webp" id="image">
</body>
